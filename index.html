<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterKino - Panel</title>

  <!-- PDF.js Support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    /* VARIABLES GLOBALES */
    :root {
      /* Theme: Master Shop (Green/White/Gray) */
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --primary-light: #dcfce7;

      --accent: #22c55e;

      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --bg-sidebar: #ffffff;

      --text-main: #111827;
      --text-muted: #6b7280;

      --border-light: #e5e7eb;
      --border-focus: var(--primary);

      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      z-index: 50;
    }

    .logo-area {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .nav-item {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .nav-item:hover {
      background: var(--bg-body);
      color: var(--text-main);
    }

    .nav-item.active {
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
    }

    /* MAIN CONTENT */
    .main-wrapper {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      /* Prevent flex overflow */
    }

    .top-header {
      height: 64px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .content-area {
      padding: 2rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* COMPONENTS */
    .liquid-glass {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }

    .liquid-glass:hover {
      box-shadow: var(--shadow-md);
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      gap: 0.5rem;
    }

    .btn--primary {
      background: var(--primary);
      color: white;
    }

    .btn--primary:hover {
      background: var(--primary-dark);
    }

    .btn--secondary {
      background: #e5e7eb;
      color: var(--text-main);
    }

    .btn--secondary:hover {
      background: #d1d5db;
    }

    .btn--danger {
      background: #ef4444;
      color: white;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      font-family: inherit;
      margin-bottom: 1rem;
    }

    input:focus,
    textarea:focus {
      outline: 2px solid var(--primary-light);
      border-color: var(--primary);
    }

    .hidden {
      display: none !important;
    }

    /* UTILS */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-left-color: var(--text-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Modal Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>

  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" class="overlay">
    <div class="liquid-glass" style="width: 350px; text-align:center;">
      <h2 style="margin-bottom:1rem">🔐 Acceso</h2>
      <input type="password" id="accessInput" placeholder="Contraseña de cliente" autofocus>
      <button id="submitAccess" class="btn btn--primary" style="width:100%">Ingresar</button>
      <p id="errorMsg" style="color:red; margin-top:1rem; font-size:0.9rem" class="hidden"></p>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-area">
      <span>⚡ MasterKino</span>
    </div>
    <nav class="nav-menu">
      <div class="nav-item active" onclick="switchTab('search', this)">
        <span>🔍</span> Buscar
      </div>
      <div class="nav-item" onclick="switchTab('upload', this)">
        <span>📤</span> Cargar
      </div>
      <div class="nav-item" onclick="switchTab('list', this)">
        <span>📋</span> Listar
      </div>
    </nav>
    <div style="margin-top:auto; border-top:1px solid var(--border-light); padding-top:1rem">
      <div class="nav-item" style="color:#ef4444" onclick="window.location.href='login.php?logout=1'">
        <span>🚪</span> Salir
      </div>
    </div>
  </aside>

  <!-- MAIN WRAPPER -->
  <div class="main-wrapper">
    <header class="top-header">
      <h2 id="page-title" style="font-size:1.1rem; font-weight:600">Buscador</h2>
      <div style="display:flex; align-items:center; gap:0.5rem">
        <span style="font-size:0.9rem">Cliente</span>
        <div style="width:32px; height:32px; background:#e5e7eb; border-radius:50%"></div>
      </div>
    </header>

    <div class="content-area">

      <!-- TAB SEARCH -->
      <div id="tab-search" class="tab-content">
        <div class="liquid-glass">
          <h3 class="section-title">Búsqueda Rápida</h3>
          <div style="display:flex; gap:0.5rem">
            <input type="text" id="searchInput" placeholder="Ingresa códigos aquí..." style="margin-bottom:0">
            <button class="btn btn--primary" onclick="doSearch()">Buscar</button>
            <button class="btn btn--secondary" onclick="clearSearch()">Limpiar</button>
          </div>
          <div id="search-status" style="margin-top:1rem"></div>
        </div>
        <div id="results-area"></div>
      </div>

      <!-- TAB UPLOAD -->
      <div id="tab-upload" class="tab-content hidden">
        <div class="liquid-glass">
          <h3 class="section-title">Subir Documento (PDF)</h3>
          <form id="uploadForm">
            <label>Nombre del Documento</label>
            <input type="text" name="name" required>

            <label>Fecha</label>
            <input type="date" name="date" required>

            <label>Archivo PDF</label>
            <input type="file" name="file" accept=".pdf" required>

            <label>Códigos (Opcional, separados por enter)</label>
            <textarea name="codes" rows="5"></textarea>

            <button type="submit" class="btn btn--primary" style="width:100%">Guardar Documento</button>
          </form>
          <div id="upload-msg" style="margin-top:1rem"></div>
        </div>
      </div>

      <!-- TAB LIST -->
      <div id="tab-list" class="tab-content hidden">
        <div class="liquid-glass" style="display:flex; justify-content:space-between; align-items:center">
          <h3 class="section-title" style="margin:0">Mis Documentos</h3>
          <button class="btn btn--secondary" onclick="loadList()">🔄 Recargar</button>
        </div>
        <div id="list-area"></div>
      </div>

    </div>
  </div>

  <script>
    // --- CORE LOGIC ---
    const params = new URLSearchParams(window.location.search);
    const clientCode = params.get('c');
    const apiUrl = 'api.php?c=' + encodeURIComponent(clientCode || '');

    if (!clientCode) window.location.href = 'login.php';

    // --- TABS ---
    function switchTab(tabName, navEl) {
      // Update Nav
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      if (navEl) navEl.classList.add('active');
      else {
        // Find by text or index if navEl not passed (simple fallback)
        // skipping for brevity, handled by onclick
      }

      // Update Content
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tabName).classList.remove('hidden');

      // Update Title
      const titles = { search: 'Buscador', upload: 'Cargar PDF', list: 'Listado' };
      document.getElementById('page-title').textContent = titles[tabName] || 'Panel';

      if (tabName === 'list') loadList();
    }

    // --- LOGIN ---
    document.getElementById('submitAccess').onclick = async () => {
      const pass = document.getElementById('accessInput').value;
      const msg = document.getElementById('errorMsg');
      if (!pass) return;

      try {
        const fd = new FormData();
        fd.append('action', 'login');
        fd.append('password', pass);

        const req = await fetch(apiUrl, { method: 'POST', body: fd });
        const res = await req.json();

        if (res.success) {
          document.getElementById('loginOverlay').classList.add('hidden');
        } else {
          msg.textContent = 'Contraseña inválida';
          msg.classList.remove('hidden');
        }
      } catch (e) {
        msg.textContent = 'Error de conexión';
        msg.classList.remove('hidden');
      }
    };

    // --- SEARCH ---
    async function doSearch() {
      const val = document.getElementById('searchInput').value.trim();
      const area = document.getElementById('results-area');
      area.innerHTML = '<div style="text-align:center; padding:2rem"><div class="spinner"></div></div>';

      if (!val) { area.innerHTML = ''; return; }

      const codes = val.split(/[\n\r,]+/).map(c => c.trim()).filter(Boolean);

      try {
        const fd = new FormData();
        fd.append('action', 'search');
        fd.append('codes', codes.join('\\n')); // API expects newline separated

        const req = await fetch(apiUrl, { method: 'POST', body: fd });
        const res = await req.json();

        if (!res || res.length === 0) {
          area.innerHTML = '<div class="liquid-glass">No se encontraron documentos.</div>';
          return;
        }

        renderDocs(res, area);

      } catch (e) {
        area.innerHTML = '<div style="color:red">Error en búsqueda: ' + e.message + '</div>';
      }
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('results-area').innerHTML = '';
    }

    // --- UPLOAD ---
    document.getElementById('uploadForm').onsubmit = async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');
      const msg = document.getElementById('upload-msg');

      btn.disabled = true;
      btn.textContent = 'Subiendo...';
      msg.innerHTML = '';

      try {
        const fd = new FormData(form);
        fd.append('action', 'upload');

        const req = await fetch(apiUrl, { method: 'POST', body: fd });
        const res = await req.json();

        if (res.success || res.message) {
          msg.innerHTML = '<span style="color:green">✅ ' + (res.message || 'Subido con éxito') + '</span>';
          form.reset();
        } else {
          msg.innerHTML = '<span style="color:red">❌ ' + (res.error || 'Error al subir') + '</span>';
        }
      } catch (e) {
        msg.innerHTML = '<span style="color:red">❌ Error de red</span>';
      }

      btn.disabled = false;
      btn.textContent = 'Guardar Documento';
    };

    // --- LIST ---
    async function loadList() {
      const area = document.getElementById('list-area');
      area.innerHTML = '<div style="text-align:center; padding:2rem"><div class="spinner"></div></div>';

      try {
        const req = await fetch(apiUrl + '&action=list&page=1&per_page=50');
        const res = await req.json();
        const list = res.data || [];

        if (list.length === 0) {
          area.innerHTML = '<div style="padding:2rem; text-align:center; color:gray">Aún no hay documentos.</div>';
          return;
        }

        renderDocs(list, area);

      } catch (e) {
        area.innerHTML = 'Error al cargar lista.';
      }
    }

    // --- RENDER UTILS ---
    function renderDocs(list, container) {
      container.innerHTML = list.map(doc => `
            <div class="liquid-glass" style="display:flex; justify-content:space-between; align-items:center; padding:1rem">
                <div>
                    <div style="font-weight:700; font-size:1.1rem">${doc.name || 'Sin Título'}</div>
                    <div style="color:var(--text-muted); font-size:0.9rem">
                        ${doc.date} • ${doc.codes ? doc.codes.length + ' códigos' : ''}
                    </div>
                </div>
                <div>
                    <a href="uploads/${doc.path}" target="_blank" class="btn btn--secondary" style="text-decoration:none">📄 Ver PDF</a>
                </div>
            </div>
        `).join('');
    }

    // --- INIT ---
    // NO contextmenu prevention to allow debugging!
    // console.log("Debug mode enabled");
  </script>
</body>

</html>
